version: '3.8'

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: 501
        GID: 20
    volumes:
      - .:/var/www
    working_dir: /var/www
    environment:
      HOME: /home/appuser
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - notification-network
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: 501
        GID: 20
    volumes:
      - .:/var/www
      - ./docker/supervisor/queue-worker.conf:/etc/supervisor/conf.d/queue-worker.conf
    working_dir: /var/www
    command: supervisord -n -c /etc/supervisor/conf.d/queue-worker.conf
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - notification-network
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - notification-network

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: notification_service
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - notification-network

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - notification-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: notification_user
      RABBITMQ_DEFAULT_PASS: secret
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - notification-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  notification-network:
    driver: bridge